global
    daemon
    log /dev/log local0
    user haproxy
    group haproxy

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    log global

frontend http_front
    bind *:8080
    acl host_example hdr(host) -i example.local
    use_backend servers_example if host_example
    default_backend servers_default

backend servers_example
    balance roundrobin
    server server1 127.0.0.1:8001 weight 2 check
    server server2 127.0.0.1:8002 weight 3 check
    server server3 127.0.0.1:8003 weight 4 check

backend servers_default
    balance roundrobin
    server server1 127.0.0.1:8001 check
    server server2 127.0.0.1:8002 check
    server server3 127.0.0.1:8003 check
